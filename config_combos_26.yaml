# 26-letter alphabet on 16 single keys (top + home rows, 2/finger) + 16 thumb-combo slots (32 total).
# Each thumb-combo "[X]" is the bare key X pressed simultaneously with a
# dedicated thumb modifier. It uses the same finger/row/hand as X; the only
# difference is a flat activation cost (combo_penalty) per combo slot
# involved in a bigram.
paths:
  item_pair_score_table:        "input/frequency/english-letter-pair-counts-google-ngrams_normalized.csv"
  position_pair_score_table:    "input/engram_2key_scores.csv"
  item_triple_score_table:      "input/frequency/english-letter-triple-counts-google-ngrams_normalized.csv"
  position_triple_score_table:  "input/engram_3key_order_scores.csv"
  layout_results_folder:        "output/layouts"

moo:
  default_objectives:
    - "engram_key_preference"
    - "engram_row_separation"
    - "engram_same_row"
    - "engram_same_finger"
  default_weights:  [1.0, 1.0, 1.0, 1.0]
  default_maximize: [true, true, true, true]
  default_max_solutions: 10000
  default_time_limit: 60
  show_progress_bar: true
  save_detailed_results: true

optimization:
  items_assigned:          ""
  items_to_assign:         "etaoinsrhldcumfpgwybvkxjqz"   # 26 letters
  items_to_constrain:      ""
  positions_assigned:      ""
  positions_to_assign:     "QWERASDFUIOPJKL;"             # 16 single keys: top + home rows, 2/finger
  positions_to_constrain:  ""
  enable_combos:             true
  max_combo_size:            1                            # ignored — thumb-combos are always size-1
  combo_penalty:             0.5                          # multiplier per thumb-combo slot in a bigram
  combo_same_finger_penalty: 1.0                          # unused for size-1 thumb-combos

visualization:
  print_keyboard: True
